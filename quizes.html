<!DOCTYPE html>
<html lang="en">
<head>
        <style>
        .quiz-app-container {
            text-align: left !important;
        }
        .quiz-question {
            justify-content: flex-start !important;
            text-align: left !important;
        }
        .quiz-options {
            align-items: flex-start !important;
        }
        .quiz-option-wrap {
            justify-content: flex-start !important;
        }
        .score-display {
            justify-content: flex-start !important;
        }
        .gear-menu-wrapper {
            position: static !important;
            margin-left: auto;
        }
        </style>
    <!-- CSS is now only in external files/styles -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizes</title>
    <link rel="stylesheet" href="styles.css?v=10">
    <link rel="stylesheet" href="quizes.css?v=1">
</head>
<body>
    <div class="score-display" id="scoreDisplay">
        <a href="https://skountrianos.com" class="home-circle" title="Home">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <div class="donut-wrapper">
            <svg class="donut" viewBox="0 0 36 36">
                <circle class="donut-bg" cx="18" cy="18" r="15.9" fill="none" stroke="#e0e0e0" stroke-width="3"/>
                <circle class="donut-ring" id="donutRemaining" cx="18" cy="18" r="15.9" fill="none" stroke="#2196f3" stroke-width="3" stroke-dasharray="100 0" stroke-dashoffset="25" stroke-linecap="round"/>
            </svg>
            <span class="donut-label" id="remainingCount">0</span>
        </div>
        <div class="donut-wrapper">
            <svg class="donut" viewBox="0 0 36 36">
                <circle class="donut-bg" cx="18" cy="18" r="15.9" fill="none" stroke="#e0e0e0" stroke-width="3"/>
                <circle class="donut-ring" id="donutCorrect" cx="18" cy="18" r="15.9" fill="none" stroke="#4caf50" stroke-width="3" stroke-dasharray="0 100" stroke-dashoffset="25" stroke-linecap="round"/>
            </svg>
            <span class="donut-label" id="correctCount">0</span>
        </div>
        <div class="donut-wrapper">
            <svg class="donut" viewBox="0 0 36 36">
                <circle class="donut-bg" cx="18" cy="18" r="15.9" fill="none" stroke="#e0e0e0" stroke-width="3"/>
                <circle class="donut-ring" id="donutWrong" cx="18" cy="18" r="15.9" fill="none" stroke="#dc3545" stroke-width="3" stroke-dasharray="0 100" stroke-dashoffset="25" stroke-linecap="round"/>
            </svg>
            <span class="donut-label" id="wrongCount">0</span>
        </div>
        <div class="gear-menu-wrapper" id="gearMenuWrapper">
            <button class="menu-btn" id="gearBtn" title="Menu"><span class="menu-icon"><span></span><span></span><span></span></span></button>
            <div class="gear-dropdown" id="gearDropdown">
                <div class="gear-option" style="flex-direction:column;align-items:flex-start;gap:6px;cursor:default;">
                    <label for="categorySelect" style="font-weight:500;font-size:14px;color:#666;">Category</label>
                    <select id="categorySelect" class="quiz-category-select"></select>
                </div>
                <div class="gear-option" style="flex-direction:column;align-items:flex-start;gap:6px;cursor:default;">
                    <label for="voiceSelect" style="font-weight:500;font-size:14px;color:#666;">Voice</label>
                    <select id="voiceSelect" class="quiz-category-select">
                        <option value="normal">🇬🇧 Female (default)</option>
                        <option value="maleGB">🇬🇧 Male</option>
                        <option value="femaleUS">🇺🇸 Female</option>
                        <option value="maleUS">🇺🇸 Male</option>
                    </select>
                </div>
                <button class="gear-option gear-option-danger" id="resetBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M21 21v-5h-5"/></svg> New Session</button>
            </div>
        </div>
    </div>
    <div class="quiz-app-container">
        <div id="quizContainer"></div>
    </div>
    <script src="auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="quizzes.js"></script>
    <script src="quiz-geography.js"></script>
    <script src="quiz-history.js"></script>
    <script src="quiz-technology.js"></script>
    <script src="quiz-space.js"></script>
    <script src="quiz-dinosaurs.js"></script>
    <script src="quiz-humanbody.js"></script>
    <script src="quiz-soccer.js?v=1"></script>
    <script src="tts.js?v=38"></script>
    <script>
        // Hamburger menu logic
        const gearBtn = document.getElementById('gearBtn');
        const gearDropdown = document.getElementById('gearDropdown');
        gearBtn.onclick = () => {
            gearDropdown.classList.toggle('show');
        };
        document.addEventListener('click', (e) => {
            if (!gearDropdown.contains(e.target) && !gearBtn.contains(e.target)) {
                gearDropdown.classList.remove('show');
            }
        });

        // Render categories
        const categorySelect = document.getElementById('categorySelect');
        const allOpt = document.createElement('option');
        allOpt.value = '__all__';
        allOpt.textContent = 'All Categories';
        categorySelect.appendChild(allOpt);
        for (const cat in quizData) {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            categorySelect.appendChild(opt);
        }

        function updateDonuts(correct, wrong, total) {
            const remaining = total - correct - wrong;
            document.getElementById('remainingCount').textContent = remaining;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = wrong;
            document.getElementById('donutRemaining').setAttribute('stroke-dasharray', `${(remaining/total)*100} ${(1-remaining/total)*100}`);
            document.getElementById('donutCorrect').setAttribute('stroke-dasharray', `${(correct/total)*100} ${(1-correct/total)*100}`);
            document.getElementById('donutWrong').setAttribute('stroke-dasharray', `${(wrong/total)*100} ${(1-wrong/total)*100}`);
        }

        // Voice selection — match spelling app (female UK)
        const synth = window.speechSynthesis;
        let quizVoice = null;
        let quizVoicesLoaded = false;

        function getQuizVoice() {
            if (quizVoice && quizVoicesLoaded) return quizVoice;
            const voices = synth.getVoices();
            if (voices.length === 0) return null;
            quizVoicesLoaded = true;
            const enGBVoices = voices.filter(v => v.lang === 'en-GB' || v.lang === 'en_GB');
            const avoidNames = ['Daniel', 'Arthur', 'Oliver', 'Thomas', 'Gordon', 'Malcolm', 'Aaron', 'Albert'];
            let selected = enGBVoices.find(v =>
                (v.name.includes('Enhanced') || v.name.includes('Premium')) &&
                !avoidNames.some(n => v.name.includes(n))
            );
            const preferredNames = ['Martha', 'Kate', 'Stephanie', 'Serena', 'Fiona', 'Hazel', 'Susan', 'Libby', 'Maisie', 'Sonia', 'Google UK English Female'];
            if (!selected) selected = enGBVoices.find(v => preferredNames.some(name => v.name.includes(name)));
            if (!selected) selected = enGBVoices.find(v => !avoidNames.some(n => v.name.includes(n)));
            if (!selected) selected = enGBVoices[0];
            if (!selected) {
                selected = voices.find(v => v.name.includes('Google UK English Female'));
            }
            if (!selected) {
                const enVoices = voices.filter(v => v.lang.startsWith('en'));
                selected = enVoices.find(v => preferredNames.some(n => v.name.includes(n)));
                if (!selected) selected = enVoices.find(v => v.name.includes('Samantha'));
                if (!selected) selected = enVoices.find(v => !avoidNames.some(n => v.name.includes(n)));
                if (!selected) selected = enVoices[0] || voices[0];
            }
            quizVoice = selected;
            return selected;
        }
        synth.getVoices();
        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = () => { quizVoice = null; quizVoicesLoaded = false; getQuizVoice(); };
        }

        // Voice options: different Cloud TTS voices and browser fallback voices
        const _voiceOptions = {
            normal:    { cloudVoice: 'en-GB-Neural2-C', cloudLang: 'en-GB', browserLang: 'en-GB', browserGender: 'female' },
            maleGB:    { cloudVoice: 'en-GB-Neural2-D', cloudLang: 'en-GB', browserLang: 'en-GB', browserGender: 'male' },
            femaleUS:  { cloudVoice: 'en-US-Neural2-C', cloudLang: 'en-US', browserLang: 'en-US', browserGender: 'female' },
            maleUS:    { cloudVoice: 'en-US-Neural2-D', cloudLang: 'en-US', browserLang: 'en-US', browserGender: 'male' }
        };
        function _getVoiceOption() {
            const sel = document.getElementById('voiceSelect');
            return _voiceOptions[(sel && sel.value) || 'normal'] || _voiceOptions.normal;
        }

        // Pick a browser fallback voice matching the selected option
        function _getBrowserVoiceFor(vo) {
            const voices = synth.getVoices();
            if (!voices.length) return getQuizVoice();
            const langVoices = voices.filter(v => v.lang === vo.browserLang || v.lang === vo.browserLang.replace('-','_'));
            if (vo.browserGender === 'male') {
                const maleNames = ['Daniel', 'Arthur', 'Oliver', 'Thomas', 'Gordon', 'Aaron', 'Albert', 'Google UK English Male', 'Google US English', 'Alex', 'Tom', 'Fred'];
                let picked = langVoices.find(v => maleNames.some(n => v.name.includes(n)));
                if (!picked) picked = langVoices[0];
                return picked || getQuizVoice();
            }
            // female — use the existing logic
            if (vo.browserLang === 'en-GB') return getQuizVoice();
            // en-US female
            const femaleNames = ['Samantha', 'Google US English', 'Allison', 'Ava', 'Susan', 'Zira'];
            let picked = langVoices.find(v => femaleNames.some(n => v.name.includes(n)));
            if (!picked) picked = langVoices[0];
            return picked || getQuizVoice();
        }

        // Unified TTS: Cloud TTS with browser fallback
        let _quizCloudActive = false;
        function quizTtsCancel() {
            synth.cancel();
            if (window.cloudTTS) cloudTTS.stop();
            _quizCloudActive = false;
        }
        function quizTtsSpeak(text, opts) {
            opts = opts || {};
            const vo = _getVoiceOption();
            if (window.cloudTTS && cloudTTS.enabled()) {
                _quizCloudActive = true;
                cloudTTS.speak(text, () => {
                    _quizCloudActive = false;
                    if (opts.onend) opts.onend();
                }, vo.cloudVoice, vo.cloudLang).then(ok => {
                    if (!ok) {
                        _quizCloudActive = false;
                        _quizBrowserSpeak(text, opts, vo);
                    }
                });
            } else {
                _quizBrowserSpeak(text, opts, vo);
            }
        }
        function _quizBrowserSpeak(text, opts, vo) {
            vo = vo || _getVoiceOption();
            const u = new SpeechSynthesisUtterance(text);
            u.rate = 1;
            u.lang = vo.browserLang;
            const v = _getBrowserVoiceFor(vo);
            if (v) u.voice = v;
            if (opts.onend) u.onend = opts.onend;
            synth.speak(u);
        }
        // Unlock iOS audio on first REAL interaction
        let _quizAudioUnlocked = false;
        function _unlockQuizTTS(e) {
            if (!e.isTrusted) return; // ignore programmatic clicks
            if (window.cloudTTS) cloudTTS.unlockAudio();
            _quizAudioUnlocked = true;
            // Auto-read the current question if it hasn't been read yet
            const hearBtn = document.getElementById('hearBtn');
            if (hearBtn && !hearBtn.dataset.read) {
                hearBtn.dataset.read = '1';
                hearBtn.click();
            }
            document.removeEventListener('click', _unlockQuizTTS);
        }
        document.addEventListener('click', _unlockQuizTTS);

        function renderQuiz(category) {
            const quizContainer = document.getElementById('quizContainer');
            quizContainer.innerHTML = '';
            let questions;
            if (category === '__all__') {
                questions = shuffleArray(Object.values(quizData).flat());
            } else {
                questions = quizData[category] ? shuffleArray([...quizData[category]]) : [];
            }
            if (!questions.length) {
                quizContainer.textContent = 'No questions in this category.';
                updateDonuts(0,0,1);
                return;
            }
            let current = 0, correct = 0, wrong = 0;
            updateDonuts(correct, wrong, questions.length);
            function showQuestion() {
                const q = questions[current];
                quizContainer.innerHTML = `
                    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
                        <div class="quiz-question" style="font-weight:700;font-size:1.2em;text-align:left;">${q.question}</div>
                        <button class="quiz-hear-btn" id="hearBtn" title="Read out loud">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                        </button>
                    </div>
                `;
                document.getElementById('hearBtn').onclick = () => {
                    quizTtsCancel();
                    const parts = [q.question, ...q.options];
                    let i = 0;
                    function speakNext() {
                        if (i >= parts.length) return;
                        quizTtsSpeak(parts[i], {
                            onend: () => {
                                i++;
                                if (i < parts.length) {
                                    setTimeout(speakNext, 500);
                                }
                            }
                        });
                    }
                    speakNext();
                };
                const opts = document.createElement('div');
                opts.className = 'quiz-options';
                q.options.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.textContent = opt;
                    btn.className = 'quiz-option';
                    btn.onclick = () => {
                        if (i === q.answer) {
                            correct++;
                            btn.classList.add('quiz-correct');
                        } else {
                            wrong++;
                            btn.classList.add('quiz-wrong');
                        }
                        btn.disabled = true;
                        Array.from(opts.querySelectorAll('button')).forEach(b => b.disabled = true);
                        // Disable hear button so it can't interrupt the explanation→next flow
                        const hb = document.getElementById('hearBtn');
                        if (hb) { hb.disabled = true; hb.style.opacity = '0.3'; hb.style.pointerEvents = 'none'; }
                        updateDonuts(correct, wrong, questions.length);
                        function advanceQuestion() {
                            if (current < questions.length - 1) {
                                current++;
                                showQuestion();
                            } else {
                                quizContainer.innerHTML = `<div class='quiz-result'>Quiz complete!<br>Score: ${correct} / ${questions.length}</div>`;
                                updateDonuts(correct, wrong, questions.length);
                            }
                        }
                        // Show and read explanation
                        const expEl = quizContainer.querySelector('.quiz-explanation');
                        if (expEl && q.explanation) {
                            expEl.style.display = '';
                            quizTtsCancel();
                            let advanced = false;
                            quizTtsSpeak(q.explanation, {
                                onend: () => {
                                    if (!advanced) { advanced = true; setTimeout(advanceQuestion, 1000); }
                                }
                            });
                            // Safety fallback: advance even if TTS onend never fires
                            setTimeout(() => { if (!advanced) { advanced = true; advanceQuestion(); } }, 15000);
                        } else {
                            setTimeout(advanceQuestion, 700);
                        }
                    };
                    opts.appendChild(btn);
                });
                quizContainer.appendChild(opts);
                if (q.explanation) {
                    const exp = document.createElement('div');
                    exp.className = 'quiz-explanation';
                    exp.textContent = q.explanation;
                    exp.style.display = 'none';
                    quizContainer.appendChild(exp);
                }
                // Auto-read question + answers (1s delay for transition)
                // On iOS/mobile, skip auto-read until audio is unlocked by a real tap
                if (_quizAudioUnlocked) {
                    setTimeout(() => {
                        const hb = document.getElementById('hearBtn');
                        if (hb) { hb.dataset.read = '1'; hb.click(); }
                    }, 1000);
                }
            }
            showQuestion();
        }
        categorySelect.onchange = e => renderQuiz(e.target.value);
        document.getElementById('resetBtn').onclick = () => {
            quizTtsCancel();
            gearDropdown.classList.remove('show');
            renderQuiz(categorySelect.value);
        };
        // Initial load
        renderQuiz(categorySelect.value);
    </script>
</body>
</html>
