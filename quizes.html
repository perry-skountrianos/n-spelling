<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizes</title>
    <link rel="stylesheet" href="styles.css?v=10">
    <link rel="stylesheet" href="quizes.css?v=1">
</head>
<body>
    <div class="quiz-app-container">
        <h1 class="profile-title">Quizes</h1>
        <div style="margin-bottom:1.5rem;">
            <label for="categorySelect" style="font-weight:500;">Category:</label>
            <select id="categorySelect"></select>
        </div>
        <div id="quizContainer"></div>
        <button id="backBtn" class="btn-cancel" style="margin-top:2rem;">Back</button>
    </div>
    <script src="quizzes.js"></script>
    <script>
        document.getElementById('backBtn').onclick = function() {
            window.location.href = 'index.html';
        };

        // Render categories
        const categorySelect = document.getElementById('categorySelect');
        for (const cat in quizData) {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            categorySelect.appendChild(opt);
        }

        function renderQuiz(category) {
            const quizContainer = document.getElementById('quizContainer');
            quizContainer.innerHTML = '';
            let questions = quizData[category] ? shuffleArray([...quizData[category]]) : [];
            if (!questions.length) {
                quizContainer.textContent = 'No questions in this category.';
                return;
            }
            let current = 0, score = 0;
            function showQuestion() {
                const q = questions[current];
                quizContainer.innerHTML = `<div class="quiz-question"><strong>Q${current+1}:</strong> ${q.question}</div>`;
                const opts = document.createElement('div');
                opts.className = 'quiz-options';
                q.options.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.textContent = opt;
                    btn.className = 'quiz-option-btn';
                    btn.onclick = () => {
                        if (i === q.answer) {
                            score++;
                            btn.style.background = '#c8e6c9';
                        } else {
                            btn.style.background = '#ffcdd2';
                        }
                        btn.disabled = true;
                        setTimeout(() => {
                            if (current < questions.length - 1) {
                                current++;
                                showQuestion();
                            } else {
                                quizContainer.innerHTML = `<div class='quiz-result'>Quiz complete!<br>Score: ${score} / ${questions.length}</div>`;
                            }
                        }, 700);
                    };
                    opts.appendChild(btn);
                });
                quizContainer.appendChild(opts);
                if (q.explanation) {
                    const exp = document.createElement('div');
                    exp.className = 'quiz-explanation';
                    exp.textContent = q.explanation;
                    exp.style.display = 'none';
                    quizContainer.appendChild(exp);
                }
            }
            showQuestion();
        }
        categorySelect.onchange = e => renderQuiz(e.target.value);
        // Initial load
        renderQuiz(categorySelect.value);
    </script>
</body>
</html>
