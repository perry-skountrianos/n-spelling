<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Skountrianos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        .apps {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
        }
        .app-link {
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s;
        }
        .app-link:hover {
            transform: scale(1.05);
        }
        .app-card {
            width: 140px;
            background: #fff;
            border-radius: 20px;
            padding: 1.5rem 1rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .app-icon {
            margin-bottom: 0.75rem;
            display: block;
        }
        .app-icon svg {
            width: 56px;
            height: 56px;
        }
        .app-name {
            font-size: 0.9rem;
            font-weight: 500;
        }
        /* Auth gate */
        .auth-gate {
            text-align: center;
            padding: 2rem;
        }
        .auth-gate input {
            font-size: 1rem;
            padding: 0.6rem 1rem;
            border: 2px solid #d2d2d7;
            border-radius: 10px;
            outline: none;
            width: 200px;
            text-align: center;
        }
        .auth-gate input:focus {
            border-color: #0071e3;
        }
        .auth-gate button {
            display: block;
            margin: 1rem auto 0;
            font-size: 1rem;
            padding: 0.6rem 2rem;
            background: #0071e3;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .auth-gate button:hover {
            background: #0077ed;
        }
        .auth-error {
            color: #ff3b30;
            font-size: 0.85rem;
            margin-top: 0.75rem;
        }
    </style>
</head>
<body>
    <!-- Auth gate -->
    <div class="auth-gate" id="authGate">
        <div style="margin-bottom:1rem;"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        <input type="password" id="authPassword" placeholder="Password" autocomplete="off">
        <button id="authSubmit">Enter</button>
        <div class="auth-error" id="authError"></div>
    </div>

    <!-- Main content (hidden until authenticated) -->
    <div class="container" id="appWrapper" style="display:none;">
        <div class="apps">
            <a href="spelling.html" class="app-link">
                <div class="app-card">
                    <span class="app-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></span>
                    <span class="app-name">Spelling</span>
                </div>
            </a>
            <a href="quizes.html" class="app-link">
                <div class="app-card">
                    <span class="app-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="7" cy="7" r="1"/><circle cx="17" cy="7" r="1"/><circle cx="7" cy="17" r="1"/><circle cx="17" cy="17" r="1"/><rect x="3" y="3" width="18" height="18" rx="3"/></svg></span>
                    <span class="app-name">Quizes</span>
                </div>
            </a>
            <a href="meal-planner.html" class="app-link">
                <div class="app-card">
                    <span class="app-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h14M5 12h14M8 17h8"/><path d="M4 4h16a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Z"/><path d="M7 17v2M17 17v2"/></svg></span>
                    <span class="app-name">Meal Planner</span>
                </div>
            </a>
            <!-- Sentences icon removed -->
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
