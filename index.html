<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Skountrianos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        .apps {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
        }
        .app-link {
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s;
        }
        .app-link:hover {
            transform: scale(1.05);
        }
        .app-card {
            width: 140px;
            background: #fff;
            border-radius: 20px;
            padding: 1.5rem 1rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .app-icon {
            font-size: 3.5rem;
            margin-bottom: 0.75rem;
            display: block;
        }
        .app-name {
            font-size: 0.9rem;
            font-weight: 500;
        }
        /* Auth gate */
        .auth-gate {
            text-align: center;
            padding: 2rem;
        }
        .auth-gate input {
            font-size: 1rem;
            padding: 0.6rem 1rem;
            border: 2px solid #d2d2d7;
            border-radius: 10px;
            outline: none;
            width: 200px;
            text-align: center;
        }
        .auth-gate input:focus {
            border-color: #0071e3;
        }
        .auth-gate button {
            display: block;
            margin: 1rem auto 0;
            font-size: 1rem;
            padding: 0.6rem 2rem;
            background: #0071e3;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .auth-gate button:hover {
            background: #0077ed;
        }
        .auth-error {
            color: #ff3b30;
            font-size: 0.85rem;
            margin-top: 0.75rem;
        }
    </style>
</head>
<body>
    <!-- Auth gate -->
    <div class="auth-gate" id="authGate">
        <div style="font-size:2.5rem;margin-bottom:1rem;">🔒</div>
        <input type="password" id="authPassword" placeholder="Password" autocomplete="off">
        <button id="authSubmit">Enter</button>
        <div class="auth-error" id="authError"></div>
    </div>

    <!-- Main content (hidden until authenticated) -->
    <div class="container" id="mainContent" style="display:none;">
        <div class="apps">
            <a href="spelling.html" class="app-link">
                <div class="app-card">
                    <span class="app-icon">ðŸ"</span>
                    <span class="app-name">Spelling</span>
                </div>
            </a>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
