<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planner</title>
    <link rel="stylesheet" href="styles.css?v=25">
    <link rel="stylesheet" href="meal-planner.css?v=1">
</head>
<body>
    <div class="score-display">
        <a href="https://skountrianos.com" class="home-circle" title="Home">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <div class="planner-title">Family Meal Planner</div>
    </div>

    <div class="meal-app-container">
        <section class="profile-row" id="profileRow"></section>

        <section class="planner-grid">
            <div class="recipe-panel">
                <div class="panel-header">
                    <div>
                        <div class="panel-label">Step 1</div>
                        <h2>Choose a recipe</h2>
                    </div>
                    <button class="primary-btn" id="addRecipeBtn">Create your own</button>
                </div>
                <div class="recipe-list" id="recipeList"></div>
            </div>

            <div class="calendar-panel">
                <div class="panel-header">
                    <div>
                        <div class="panel-label">Step 2</div>
                        <h2>Plan a week</h2>
                    </div>
                    <div class="hint">Drag recipes into breakfast, lunch, or dinner.</div>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </section>
    </div>

    <div class="modal hidden" id="recipeModal" aria-hidden="true">
        <div class="modal-backdrop"></div>
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button class="modal-close" id="closeModalBtn" aria-label="Close">×</button>
            <h3 id="modalTitle">Create a recipe</h3>
            <div class="modal-body">
                <label class="input-group">
                    <span>Recipe name</span>
                    <input type="text" id="newRecipeName" placeholder="e.g. Berry Smoothie">
                </label>
                <label class="input-group">
                    <span>Best for</span>
                    <select id="newRecipeMeal">
                        <option value="Breakfast">Breakfast</option>
                        <option value="Lunch">Lunch</option>
                        <option value="Dinner">Dinner</option>
                    </select>
                </label>
                <div class="nutrition-grid">
                    <label><input type="checkbox" id="newRecipeFruit"> 🍎 Fruit</label>
                    <label><input type="checkbox" id="newRecipeVeg"> 🥦 Veggies</label>
                    <label><input type="checkbox" id="newRecipeProtein"> 🍗 Protein</label>
                    <label><input type="checkbox" id="newRecipeCarbs"> 🍞 Carbs</label>
                </div>
                <label class="input-group full-width">
                    <span>Fun note</span>
                    <input type="text" id="newRecipeNote" placeholder="e.g. Gives you energy to play">
                </label>
            </div>
            <button class="primary-btn modal-save" id="saveRecipeBtn">Save recipe</button>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="meal-planner.js?v=1"></script>
</body>
</html>
