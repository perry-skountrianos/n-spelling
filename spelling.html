<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Practice</title>
    <link rel="stylesheet" href="styles.css?v=10">
</head>
<body>
    <div id="mainContent" style="display:none;">
    <!-- Profile selector screen -->
    <div class="profile-screen" id="profileScreen">
        <h1 class="profile-title">Who's practicing?</h1>
        <div class="profile-list" id="profileList"></div>
        <button class="profile-add-btn" id="addProfileBtn">+ Add Player</button>
        <button class="profile-delete-btn" id="deleteProfileBtn">Delete a player</button>
    </div>

    <!-- Profile Edit Modal -->
    <div class="profile-edit-overlay" id="profileEditOverlay" style="display: none;">
        <div class="profile-edit-panel">
            <div class="profile-edit-header">
                <h2 id="profileEditTitle">Edit Player</h2>
                <button class="profile-edit-close" id="profileEditCloseBtn">✕</button>
            </div>
            <div class="profile-edit-form">
                <input type="text" id="profileEditName" maxlength="20" placeholder="Player name">
                <div class="avatar-picker-label">Choose an icon</div>
                <div class="avatar-picker" id="avatarPicker"></div>
            </div>
            <div class="profile-edit-actions">
                <button type="button" class="btn-cancel" id="cancelProfileEditBtn">Cancel</button>
                <button type="button" class="btn-save" id="saveProfileEditBtn">Save</button>
            </div>
        </div>
    </div>

    <div class="gear-menu-wrapper" id="gearMenuWrapper" style="display: none;">
        <button class="menu-btn" id="gearBtn" title="Menu"><span class="menu-icon"><span></span><span></span><span></span></span></button>
        <div class="gear-dropdown" id="gearDropdown">
            <button class="gear-option" id="modeToggleBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> Practice Mode</button>
            <button class="gear-option" id="viewReportsBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 16V8"/><path d="M12 16v-5"/><path d="M16 16v-8"/></svg> Reports</button>

            <button class="gear-option" id="wordListsBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.25v13"/><path d="M17.5 10H19a2 2 0 0 1 0 4h-2"/><path d="M3 10h2a2 2 0 0 1 0 4H3"/><path d="M12 6a4 4 0 0 0-4 4c0 2 1 4 4 8 3-4 4-6 4-8a4 4 0 0 0-4-4Z"/></svg> Word Lists</button>
            <button class="gear-option" id="switchProfileBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Switch Player</button>
            <button class="gear-option gear-option-danger" id="resetBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M21 21v-5h-5"/></svg> New Session</button>
        </div>
    </div>
    <div class="score-display" id="scoreDisplay" style="display: none;">
        <a href="https://skountrianos.com" class="home-circle" title="Home">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <div class="profile-circle" id="profileIndicator" title="Switch Player">
            <span class="profile-circle-avatar" id="profileAvatar">🦁</span>
        </div>
        <div class="donut-wrapper">
            <svg class="donut" viewBox="0 0 36 36">
                <circle class="donut-bg" cx="18" cy="18" r="15.9" fill="none" stroke="#e0e0e0" stroke-width="3"/>
                <circle class="donut-ring" id="donutRemaining" cx="18" cy="18" r="15.9" fill="none" stroke="#2196f3" stroke-width="3" stroke-dasharray="100 0" stroke-dashoffset="25" stroke-linecap="round"/>
            </svg>
            <span class="donut-label" id="remainingCount">0</span>
        </div>
        <div class="donut-wrapper">
            <svg class="donut" viewBox="0 0 36 36">
                <circle class="donut-bg" cx="18" cy="18" r="15.9" fill="none" stroke="#e0e0e0" stroke-width="3"/>
                <circle class="donut-ring" id="donutCorrect" cx="18" cy="18" r="15.9" fill="none" stroke="#4caf50" stroke-width="3" stroke-dasharray="0 100" stroke-dashoffset="25" stroke-linecap="round"/>
            </svg>
            <span class="donut-label" id="correctCount">0</span>
        </div>
        <div class="donut-wrapper">
            <svg class="donut" viewBox="0 0 36 36">
                <circle class="donut-bg" cx="18" cy="18" r="15.9" fill="none" stroke="#e0e0e0" stroke-width="3"/>
                <circle class="donut-ring" id="donutWrong" cx="18" cy="18" r="15.9" fill="none" stroke="#dc3545" stroke-width="3" stroke-dasharray="0 100" stroke-dashoffset="25" stroke-linecap="round"/>
            </svg>
            <span class="donut-label" id="wrongCount">0</span>
        </div>
    </div>
    <div class="container" style="display: none;">
        <div class="main-content" id="mainContent">
            <div class="word-section">
            </div>

            <!-- Test mode content -->
            <div id="testContent">
                <div class="input-section">
                    <button class="hear-btn" id="hearBtn" title="Hear Word"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
                    <input 
                        type="text" 
                        id="spellingInput" 
                        placeholder="Hit Enter"
                        autocomplete="off"
                    >
                </div>

                <div class="results-display" id="resultsDisplay"></div>

                <div class="feedback" id="feedback"></div>

                <button class="restart-btn" id="restartBtn" style="display: none;">Start Over</button>
            </div>

            <!-- Practice mode content -->
            <div id="practiceContent" style="display: none;">
                <div class="flashcard-container">
                    <div class="flashcard-empty" id="flashcardEmpty">
                        <p>No wrong words to practice yet.</p>
                        <p>Complete a test first!</p>
                    </div>
                    <div class="flashcard" id="flashcard" style="display: none;">
                        <div class="flashcard-word" id="flashcardWord"></div>
                        <div class="flashcard-sentence" id="flashcardSentence"></div>
                        <div class="flashcard-mistake" id="flashcardMistake"></div>
                        <div class="flashcard-tip" id="flashcardTip"></div>
                    </div>
                    <div class="flashcard-nav" id="flashcardNav" style="display: none;">
                        <button class="flashcard-arrow" id="flashcardPrev">←</button>
                        <button class="flashcard-play" id="flashcardPlay" title="Auto-play">▶</button>
                        <button class="flashcard-speaker" id="flashcardSpeaker" title="Mute/Unmute"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
                        <span class="flashcard-counter" id="flashcardCounter">1 / 5</span>
                        <button class="flashcard-arrow" id="flashcardNext">→</button>
                    </div>
                    <div class="flashcard-family" id="flashcardFamily" style="display: none;"></div>
                </div>
            </div>
        </div>

        <div class="results-section" id="resultsSection" style="display: none;">
            <h1>Practice Complete!</h1>
            <div class="final-score">
                <p class="score-text">Final Score</p>
                <p class="score-number" id="finalScore">0 / 100</p>
            </div>

            <div class="incorrect-section" id="incorrectSection" style="display: none;">
                <h2>Words to Practice</h2>
                <div class="incorrect-words" id="incorrectWords"></div>
            </div>

            <button class="restart-btn" id="restartBtn2">Try Again</button>
        </div>

        <div class="list-footer" id="listFooter"></div>
    </div>

    <!-- Reports overlay -->
    <div class="reports-overlay" id="reportsOverlay" style="display: none;">
        <div class="reports-panel">
            <div class="reports-header">
                <h2><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -3px; margin-right: 6px;"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 16V8"/><path d="M12 16v-5"/><path d="M16 16v-8"/></svg>Spelling Reports</h2>
                <button class="reports-close" id="reportsCloseBtn">✕</button>
            </div>
            <div class="reports-list" id="reportsList">
                <p class="reports-loading">Loading reports...</p>
            </div>
        </div>
    </div>


    <!-- Word Lists Modal -->
    <div class="wordlists-overlay" id="wordlistsOverlay" style="display: none;">
        <div class="wordlists-panel">
            <div class="wordlists-header">
                <h2><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -3px; margin-right: 6px;"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>Word Lists</h2>
                <button class="wordlists-close" id="wordlistsCloseBtn">✕</button>
            </div>
            <div class="wordlists-list" id="wordlistsList"></div>
            <button class="wordlists-add-btn" id="addWordListBtn">+ Create New List</button>
        </div>
    </div>

    <!-- Edit/Create Word List Modal -->
    <div class="wordlist-edit-overlay" id="wordlistEditOverlay" style="display: none;">
        <div class="wordlist-edit-panel">
            <div class="wordlist-edit-header">
                <h2 id="wordlistEditTitle">Create Word List</h2>
                <button class="wordlist-edit-close" id="wordlistEditCloseBtn">✕</button>
            </div>
            <div class="wordlist-edit-form">
                <input type="text" id="wordlistNameInput" maxlength="32" placeholder="List name">
                <div class="wordlist-words-label">Words</div>
                <div class="wordlist-words-list" id="wordlistWordsList"></div>
                <div class="wordlist-add-row">
                    <input type="text" id="newWordInput" maxlength="24" placeholder="Type a word...">
                    <button type="button" id="addWordBtn">+</button>
                </div>
            </div>
            <div class="wordlist-edit-actions">
                <button type="button" class="btn-cancel" id="cancelWordListBtn">Cancel</button>
                <button type="button" class="btn-save" id="saveWordListBtn">Save</button>
            </div>
        </div>
    </div>

    </div>

    <script src="auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="words.js"></script>
    <script src="quizzes.js"></script>
    <script src="tts.js?v=35"></script>
    <script src="script.js?v=36"></script>
</body>
</html>
